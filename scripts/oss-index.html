<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Tools 下载</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;max-width:640px;margin:60px auto;padding:0 20px;text-align:center}
h1{font-size:2em;margin-bottom:.5em}
.status{color:#666;margin:2em 0}
.download-btn{display:inline-block;padding:14px 36px;background:#409eff;color:#fff;border-radius:8px;text-decoration:none;font-size:1.1em;margin-top:1em}
.download-btn:hover{background:#337ecc}
.meta{color:#999;font-size:.85em;margin-top:2em}
</style>
</head>
<body>
<h1>📋 Excel Tools</h1>
<p>Excel 自动化处理工具</p>
<div class="status" id="status">正在检查最新版本...</div>
<div id="download"></div>
<p class="meta" id="meta"></p>
<script>
fetch('latest.yml')
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(text => {
    const m = text.match(/version:\s*(\S+)/);
    if (!m) throw new Error('version not found');
    const v = m[1];
    const exeName = 'Excel-Tools-Setup-v' + v + '.exe';
    document.getElementById('status').textContent = '最新版本: v' + v;
    document.getElementById('download').innerHTML = '<a class="download-btn" href="' + exeName + '">下载 Excel Tools v' + v + '</a>';
    document.getElementById('meta').textContent = '文件大小: ' + (text.match(/size:\s*(\S+)/)?.[1] || '');
  })
  .catch(err => {
    document.getElementById('status').innerHTML = '加载版本信息失败<br><span style="font-size:.85em;color:#999">' + err.message + '</span>';
    document.getElementById('download').innerHTML = '<p style="color:#999">可用下载方式:</p><p><a href="https://github.com/ZephyrTut/excel-tools/releases">GitHub Releases</a></p>';
  });
</script>
</body>
</html>
