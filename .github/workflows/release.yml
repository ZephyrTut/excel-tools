name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    permissions:
      contents: write

    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      npm_config_electron_mirror: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

    steps:
      - uses: actions/checkout@v4

      - name: Init timing summary
        shell: pwsh
        run: |
          @"
          # Release Timing Summary

          - Workflow: ${{ github.workflow }}
          - Ref: ${{ github.ref_name }}
          - Runner: windows-latest
          "@ | Set-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Configure pnpm network retries
        shell: pwsh
        run: |
          pnpm config set fetch-retries 5
          pnpm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          pnpm install --frozen-lockfile
          $sw.Stop()
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Install dependencies: $([math]::Round($sw.Elapsed.TotalSeconds, 1))s"

      - name: Build renderer
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          pnpm build:renderer
          $sw.Stop()
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Build renderer: $([math]::Round($sw.Elapsed.TotalSeconds, 1))s"

      - name: Build installer
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          pnpm exec electron-builder --config electron-builder.json --publish never
          $sw.Stop()
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Build installer: $([math]::Round($sw.Elapsed.TotalSeconds, 1))s"

      - name: Mark release upload start
        shell: pwsh
        run: |
          "RELEASE_UPLOAD_START=$(Get-Date -UFormat %s)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          name: Excel Tools ${{ github.ref_name }}
          body: |
            ## Excel Tools ${{ github.ref_name }}

            ### Windows
            - `Excel-Tools-Setup-${{ github.ref_name }}.exe` - Installer

            Built automatically by GitHub Actions.
          files: |
            dist/installers/*.exe
            dist/installers/*.exe.blockmap
            dist/installers/latest.yml
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Record release upload timing
        shell: pwsh
        run: |
          $end = [int64][double](Get-Date -UFormat %s)
          $start = [int64]$env:RELEASE_UPLOAD_START
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Upload GitHub release assets: $($end - $start)s"

      # ── 同步安装包到 Gitee（国内用户免 VPN 更新） ──────────────
      - name: Sync installers to Gitee mirror
        shell: bash
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_TOKEN is empty, skip Gitee sync."
            exit 0
          fi

          cd dist/installers
          git init
          git checkout -b release
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "sync ${{ github.ref_name }}"
          git remote add gitee https://ZephyrTut@gitee.com/ZephyrTut/excel-tools.git

          git config --local credential.https://gitee.com.helper ""

          ASKPASS="$(pwd)/.gitee-askpass"
          printf '#!/bin/sh\n' > "$ASKPASS"
          printf 'echo "$GITEE_TOKEN"\n' >> "$ASKPASS"
          chmod +x "$ASKPASS"

          GIT_ASKPASS="$ASKPASS" git push gitee release --force
