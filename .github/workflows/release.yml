# =============================================================================
# GitHub Actions — 自动构建 & 发布到 GitHub Releases
#
# 触发方式: 推送形如 v0.1.0、v1.2.3 的 tag 时自动执行
# 也可手动触发: Actions 页面 → Release → Run workflow
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 先安装 pnpm（后续 setup-node cache 需要 pnpm 在 PATH 中）
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 设置 Node.js + 自动缓存 pnpm store（一次搞定，不再重复调用）
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      # 重新安装 app-builder-bin，避免 Windows 运行器上 Go 二进制崩溃
      - run: pnpm remove app-builder-bin && pnpm add -D app-builder-bin@latest

      - run: pnpm build:renderer

      # --publish never: electron-builder 不自行发布，由下面 softprops 统一上传
      - run: pnpm exec electron-builder --config electron-builder.json --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""

      # 上传构建产物到 GitHub Release（只传安装包和 blockmap，避免 win-unpacked 进入 assets）
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Excel Tools ${{ env.RELEASE_TAG }}
          body: |
            ## Excel Tools ${{ env.RELEASE_TAG }}

            ### Windows
            - `Excel-Tools-Setup-${{ env.RELEASE_TAG }}.exe` — 安装包（推荐）

            ---
            自动发布自 GitHub Actions。
          files: |
            dist/installers/*.exe
            dist/installers/*.exe.blockmap
            dist/installers/latest.yml
          draft: false
          prerelease: false
          generate_release_notes: false

      # ── 同步安装包到 Gitee（国内用户免 VPN 更新） ──────────────
      - name: Sync installers to Gitee mirror
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          cd dist/installers
          git init
          git checkout -b release
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "sync ${{ env.RELEASE_TAG }}"
          git remote add gitee https://ZephyrTut@gitee.com/ZephyrTut/excel-tools.git

          # 禁用 Git Credential Manager 对 Gitee 的干扰
          git config --local credential.https://gitee.com.helper ""

          # 用绝对路径写 askpass 脚本（避免 Windows 上相对路径找不到）
          ASKPASS="$(pwd)/.gitee-askpass"
          printf '#!/bin/sh\n' > "$ASKPASS"
          printf 'echo "$GITEE_TOKEN"\n' >> "$ASKPASS"
          chmod +x "$ASKPASS"

          GIT_ASKPASS="$ASKPASS" git push gitee release --force
