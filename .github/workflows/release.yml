# =============================================================================
# GitHub Actions — 自动构建 & 发布到 GitHub Releases
#
# 触发方式: 推送形如 v0.1.0、v1.2.3 的 tag 时自动执行
# 也可手动触发: Actions 页面 → Release → Run workflow
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Init timing summary
        shell: pwsh
        run: |
          @"
          # Release Timing Summary

          - Workflow: ${{ github.workflow }}
          - Ref: ${{ github.ref_name }}
          - Runner: windows-latest
          "@ | Set-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          pnpm install --frozen-lockfile
          $sw.Stop()
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Install dependencies: $([math]::Round($sw.Elapsed.TotalSeconds, 1))s"

      - name: Build renderer
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          pnpm build:renderer
          $sw.Stop()
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Build renderer: $([math]::Round($sw.Elapsed.TotalSeconds, 1))s"

      - name: Build installer
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          pnpm exec electron-builder --config electron-builder.json --publish never
          $sw.Stop()
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Build installer: $([math]::Round($sw.Elapsed.TotalSeconds, 1))s"
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Mark release upload start
        shell: pwsh
        run: |
          "RELEASE_UPLOAD_START=$(Get-Date -UFormat %s)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          name: Excel Tools ${{ github.ref_name }}
          body: |
            ## Excel Tools ${{ github.ref_name }}

            ### Windows
            - `Excel-Tools-Setup-${{ github.ref_name }}.exe` - 安装包（推荐）

            ---
            自动发布自 GitHub Actions。
          files: |
            dist/installers/*.exe
            dist/installers/*.exe.blockmap
            dist/installers/latest.yml
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Record release upload timing
        shell: pwsh
        run: |
          $end = [int64][double](Get-Date -UFormat %s)
          $start = [int64]$env:RELEASE_UPLOAD_START
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Upload GitHub release assets: $($end - $start)s"
