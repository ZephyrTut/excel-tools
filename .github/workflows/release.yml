name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    permissions:
      contents: write

    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      npm_config_electron_mirror: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine effective tag
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "CURRENT_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "CURRENT_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
          fi

      - name: Init timing summary
        shell: pwsh
        run: |
          @"
          # Release Timing Summary

          - Workflow: ${{ github.workflow }}
          - Ref: ${{ env.CURRENT_TAG }}
          - Runner: windows-latest
          "@ | Set-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          pnpm install --frozen-lockfile
          $sw.Stop()
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Install dependencies: $([math]::Round($sw.Elapsed.TotalSeconds, 1))s"

      - name: Build renderer
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          pnpm build:renderer
          $sw.Stop()
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Build renderer: $([math]::Round($sw.Elapsed.TotalSeconds, 1))s"

      - name: Build installer
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          pnpm exec electron-builder --config electron-builder.json --publish never
          $sw.Stop()
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Build installer: $([math]::Round($sw.Elapsed.TotalSeconds, 1))s"

      - name: Generate release notes
        shell: pwsh
        run: |
          $currentTag = "${{ env.CURRENT_TAG }}"
          $prevTag = git tag --sort=-version:refname | Where-Object { $_ -ne $currentTag } | Select-Object -First 1

          if ($prevTag) {
            $lines = git log "$prevTag..$currentTag" --oneline --no-decorate --format="- %s" `
              | Where-Object { $_ -notmatch '^\- release: v' }
            $log = $lines -join "`r`n"
          } else {
            $log = "Initial release."
          }

          $body = @(
            "## Excel Tools $currentTag",
            "",
            "### 更新内容",
            $log,
            "",
            "### Windows",
            "- ``Excel-Tools-Setup-$currentTag.exe`` — 安装包",
            "",
            "Built automatically by GitHub Actions."
          ) -join "`r`n"
          Set-Content -Path "$env:RUNNER_TEMP/release-body.md" -Value $body -Encoding UTF8

      - name: Upload GitHub release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Excel Tools ${{ env.CURRENT_TAG }}
          body_path: ${{ runner.temp }}/release-body.md
          files: |
            dist/installers/*.exe
            dist/installers/*.exe.blockmap
            dist/installers/latest.yml
          draft: false
          prerelease: false
          generate_release_notes: false

      # ── 同步安装包到阿里云 OSS（国内用户免 VPN 更新） ────────
      - name: Sync installers to Alibaba OSS mirror
        continue-on-error: true
        timeout-minutes: 15
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
        shell: pwsh
        run: |
          if (-not $env:OSS_ACCESS_KEY_ID) {
            Write-Host "OSS_ACCESS_KEY_ID is empty, skip OSS sync."
            exit 0
          }

          Write-Host "Downloading ossutil..."
          Invoke-WebRequest -Uri "https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-windows-amd64.zip" -OutFile ossutil.zip
          Expand-Archive -Path ossutil.zip -DestinationPath . -Force

          Write-Host "Configuring ossutil..."
          .\ossutil-v1.7.19-windows-amd64\ossutil config -e "oss-$env:OSS_REGION.aliyuncs.com" -i "$env:OSS_ACCESS_KEY_ID" -k "$env:OSS_ACCESS_KEY_SECRET"

          Write-Host "Uploading files to OSS..."
          .\ossutil-v1.7.19-windows-amd64\ossutil cp dist/installers/latest.yml "oss://$env:OSS_BUCKET/latest.yml" -f
          Get-ChildItem -Path dist/installers -Filter "*.exe" | ForEach-Object {
            .\ossutil-v1.7.19-windows-amd64\ossutil cp $_.FullName "oss://$env:OSS_BUCKET/$($_.Name)" -f
          }
          Get-ChildItem -Path dist/installers -Filter "*.exe.blockmap" | ForEach-Object {
            .\ossutil-v1.7.19-windows-amd64\ossutil cp $_.FullName "oss://$env:OSS_BUCKET/$($_.Name)" -f
          }

          Write-Host "OSS sync complete."

  # ── Cloudflare 下载页部署（独立 ubuntu job，与 Windows build 并行） ──
  deploy-cloudflare:
    name: Deploy download page
    needs: build-and-release
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Generate and deploy download page
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is empty, skip Cloudflare Pages deploy."
            exit 0
          fi

          currentVersion=$(git describe --tags --abbrev=0)

          # Fetch all releases with body from GitHub, sorted newest first
          allReleases=$(gh release list --limit 100 --exclude-drafts --json tagName,body | jq -c '.[]')

          # Build version list HTML
          versionItems=""
          while IFS= read -r release; do
            ver=$(echo "$release" | jq -r '.tagName')
            body=$(echo "$release" | jq -r '.body')
            [ "$ver" = "null" ] && continue

            badge=""
            [ "$ver" = "$currentVersion" ] && badge=' <span class="badge">★ 最新</span>'

            # Extract changelog between "### 更新内容" and next "###" or end
            changelog=""
            if echo "$body" | grep -q '### 更新内容'; then
              changelog=$(echo "$body" | sed -n '/### 更新内容/,/^###/p' | tail -n +2 | head -n -1)
              if [ -n "$changelog" ]; then
                changelog=$(echo "$changelog" | sed 's/^- /<li>/; s/$/<\/li>/')
                changelog="<details><summary>更新内容</summary><ul>${changelog}</ul></details>"
              fi
            fi

            versionItems="${versionItems}<li><a href=\"https://excel-tools-release.oss-cn-hangzhou.aliyuncs.com/Excel-Tools-Setup-${ver}.exe\">${ver}</a>${badge}${changelog}</li>"
          done <<< "$allReleases"

          # Build index.html
          tmpDir="$RUNNER_TEMP/cloudflare-pages"
          mkdir -p "$tmpDir"

          cat > "$tmpDir/index.html" << HTMLEOF
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1.0">
          <title>Excel Tools 下载</title>
          <style>
          body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;max-width:640px;margin:60px auto;padding:0 20px;text-align:center}
          h1{font-size:2em}
          .btn{display:inline-block;padding:14px 36px;background:#409eff;color:#fff;border-radius:8px;text-decoration:none;font-size:1.1em;margin:1em 0}
          .btn:hover{background:#337ecc}
          ul{list-style:none;padding:0;text-align:left}
          li{padding:8px 12px;border-bottom:1px solid #eee}
          li a{color:#409eff;text-decoration:none}
          li a:hover{text-decoration:underline}
          .badge{color:#e6a23c;font-weight:bold}
          details{margin:4px 0 4px 16px;font-size:0.85em;color:#666}
          details summary{cursor:pointer;color:#999}
          details ul{padding-left:20px;margin:4px 0}
          details li{margin:2px 0;border:none;padding:2px}
          .meta{color:#999;font-size:0.85em;margin-top:2em}
          </style>
          </head>
          <body>
          <h1>Excel Tools</h1>
          <p>Excel 自动化处理工具</p>
          <a class="btn" href="https://excel-tools-release.oss-cn-hangzhou.aliyuncs.com/Excel-Tools-Setup-${currentVersion}.exe">立即下载最新版</a>
          <h2>所有版本</h2>
          <ul>${versionItems}</ul>
          <p class="meta">版本信息：<a href="https://excel-tools-release.oss-cn-hangzhou.aliyuncs.com/latest.yml">latest.yml</a></p>
          </body>
          </html>
          HTMLEOF

          echo "Deploying to Cloudflare Pages..."
          wrangler pages deploy "$tmpDir" --project-name excel-tools --branch main
          echo "Cloudflare Pages deploy complete."
