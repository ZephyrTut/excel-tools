name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Refresh app-builder-bin
        run: pnpm add -D app-builder-bin@latest

      - name: Build renderer
        run: pnpm build:renderer

      - name: Build installer
        run: pnpm exec electron-builder --config electron-builder.json --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Excel Tools ${{ env.RELEASE_TAG }}
          body: |
            ## Excel Tools ${{ env.RELEASE_TAG }}

            ### Windows
            - `Excel-Tools-Setup-${{ env.RELEASE_TAG }}.exe` - 安装包（推荐）
            ---
            自动发布自 GitHub Actions。
          files: |
            dist/installers/*.exe
            dist/installers/*.exe.blockmap
            dist/installers/latest.yml
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Sync installers to Gitee mirror
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          cd dist/installers
          git init
          git checkout -b release
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "sync ${{ env.RELEASE_TAG }}"
          git remote add gitee https://ZephyrTut@gitee.com/ZephyrTut/excel-tools.git

          git config --local credential.https://gitee.com.helper ""

          ASKPASS="$(pwd)/.gitee-askpass"
          printf '#!/bin/sh\n' > "$ASKPASS"
          printf 'echo "$GITEE_TOKEN"\n' >> "$ASKPASS"
          chmod +x "$ASKPASS"

          GIT_ASKPASS="$ASKPASS" git push gitee release --force
