# =============================================================================
# GitHub Actions — 自动构建 & 发布到 GitHub Releases
#
# 触发方式: 推送形如 v0.1.0、v1.2.3 的 tag 时自动执行
# 也可手动触发: Actions 页面 → Release → Run workflow
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 先安装 pnpm（后续 setup-node cache 需要 pnpm 在 PATH 中）
      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      # 设置 Node.js + 自动缓存 pnpm store（一次搞定，不再重复调用）
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:renderer

      - run: pnpm exec electron-builder --config electron-builder.json
        env:
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""

      # 上传构建产物到 GitHub Release
      - uses: softprops/action-gh-release@v2
        with:
          name: Excel Tools ${{ github.ref_name }}
          body: |
            ## Excel Tools ${{ github.ref_name }}

            请从下方 Assets 下载对应平台的安装包。

            ---
            自动发布自 GitHub Actions。
          files: dist/installers/**/*
          draft: false
          prerelease: false
          generate_release_notes: false
